name: 每日资讯爬取

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml 2>/dev/null || true

      - name: 运行爬虫
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python crawler/run.py

      - name: 提交并推送数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news.data.js
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "auto: 更新资讯数据 $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi