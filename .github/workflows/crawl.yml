name: 每日资讯爬取

on:
  # 每天早上8点(北京时间)自动运行
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = 北京时间 8:00
  # 支持手动点击运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml 2>/dev/null || true

      - name: 运行爬虫
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python crawler/run.py

      - name: 上传爬取数据
        uses: actions/upload-artifact@v4
        with:
          name: news-data
          path: |
            data/news.json
            data/news.data.js
          retention-days: 1