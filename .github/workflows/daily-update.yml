name: Daily News Update

on:
  schedule:
    # UTC 0:00 = Beijing 8:00 (CST = UTC+8)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml 2>/dev/null || true
        working-directory: safe-box-news

      - name: Run crawler (reads categories.json, outputs news.json + news.data.js)
        run: python crawler/run.py
        working-directory: safe-box-news

      - name: Commit and push if changed
        run: |
          cd safe-box-news
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news.json data/news.data.js
          git diff --cached --quiet || git commit -m "auto: daily news update $(date +%Y-%m-%d)"
          git push