<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保险柜行业资讯 · 最近 7 天</title>
  <meta name="description" content="保险柜/保险箱/保管箱行业最近 7 天权威媒体动态聚合，含京东采销操盘建议。" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <span class="brand-icon">🔒</span>
        <h1>保险柜行业资讯</h1>
        <span class="brand-tag">最近 7 天 · 权威媒体聚合</span>
      </div>
      <div class="stats" id="stats">
        <span class="stat-item"><strong id="stat-total">--</strong>条资讯</span>
        <span class="stat-divider">·</span>
        <span class="stat-item"><strong id="stat-sources">--</strong>个来源</span>
        <span class="stat-divider">·</span>
        <span class="stat-item">更新于 <strong id="stat-time">--</strong></span>
      </div>
    </div>
  </header>

  <section class="toolbar">
    <div class="container toolbar-inner">
      <div class="filter-row">
        <span class="filter-label">媒体</span>
        <div class="source-filter chips-wrap" id="source-filter">
          <button class="chip chip-active" data-source="">全部</button>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label">关键词</span>
        <div class="keyword-filter chips-wrap" id="keyword-filter">
          <button class="chip chip-keyword chip-active" data-keyword="">全部</button>
        </div>
      </div>
      <div class="search-box">
        <input type="search" id="search-input" placeholder="搜索标题或摘要..." aria-label="搜索" />
      </div>
    </div>
  </section>

  <main class="container">
    <div id="news-list" class="news-list" aria-live="polite"></div>
    <div id="empty-state" class="empty-state" hidden>
      <p>暂无匹配的新闻 ✨</p>
      <p class="empty-tip">试试切换其他来源或清空搜索关键词</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>数据来源：新浪家居 · 网易家居 · 中华网 · 太平洋家居 · 搜狐 · 品牌官网 等</p>
      <p class="footer-sub">本站为聚合展示项目，点击新闻卡片可跳转至原文 · 京东采销操盘建议基于规则引擎自动生成，仅供参考</p>
    </div>
  </footer>

  <script src="./data/news.data.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
